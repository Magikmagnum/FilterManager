grumphp:
    hooks_dir: ~
    hooks_preset: local
    git_hook_variables:
        VAGRANT_HOST_DIR: .
        VAGRANT_PROJECT_DIR: /app
        EXEC_GRUMPHP_COMMAND: docker compose run --rm php
        ENV: {}
    tasks:
        phpcsfixer:
            config: .php-cs-fixer.dist.php
            allow_risky: true
            using_cache: false
            triggered_by: [php]
        phpstan:
            configuration: phpstan.neon
            use_grumphp_paths: false
        phpunit:
            config_file: phpunit.xml.dist
            always_execute: false
