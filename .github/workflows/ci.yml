name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint (PHP CS Fixer + PHPStan level 8)
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (CS + Static Analysis)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: php-cs-fixer, phpstan
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP CS Fixer — check PSR-12 compliance
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --rules=@PSR12
        continue-on-error: false

      - name: PHPStan — static analysis level 8
        run: vendor/bin/phpstan analyse src --level=8 --no-progress

  # ---------------------------------------------------------------------------
  # Job 2 — Tests (PHPUnit + coverage >= 96%)
  # ---------------------------------------------------------------------------
  test:
    name: "Tests (PHP 8.2 + Coverage)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: xdebug
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit with coverage
        run: |
          vendor/bin/phpunit \
            --coverage-clover=coverage.xml \
            --coverage-html=coverage-html \
            --colors=always

      - name: Check coverage threshold (>= 96%)
        run: |
          COVERAGE=$(php -r "
            \$xml     = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$covered = (int)\$metrics['coveredstatements'];
            \$total   = (int)\$metrics['statements'];
            echo \$total > 0 ? round(\$covered / \$total * 100, 2) : 0;
          ")
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "${COVERAGE} < 96" | bc -l) )); then
            echo "❌ Code coverage is ${COVERAGE}% — minimum required is 96%"
            exit 1
          fi
          echo "✅ Code coverage is ${COVERAGE}% — threshold passed"

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: coverage-html/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 3 — Security check
  # ---------------------------------------------------------------------------
  security-check:
    name: "Security Check"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Symfony CLI
        run: |
          curl -sS https://get.symfony.com/cli/installer | bash
          echo "$HOME/.symfony5/bin" >> $GITHUB_PATH

      - name: Symfony security check
        run: symfony check:security

      - name: Composer audit
        run: composer audit

  # ---------------------------------------------------------------------------
  # Job 4 — Build validation in a fresh Symfony project
  # ---------------------------------------------------------------------------
  build-validation:
    name: "Build Validation (fresh Symfony install)"
    runs-on: ubuntu-latest
    needs: [test, security-check]

    steps:
      - uses: actions/checkout@v4
        with:
          path: filter-manager-bundle

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Create fresh Symfony 7 skeleton project
        run: composer create-project symfony/skeleton:^7.0 test-app --no-interaction --prefer-dist

      - name: Add bundle as local path repository
        working-directory: test-app
        run: |
          composer config repositories.filter-manager \
            '{"type":"path","url":"../filter-manager-bundle","options":{"symlink":false}}'
          composer require ericgansa/filter-manager-bundle:@dev --no-interaction

      - name: Register bundle in Symfony kernel
        run: |
          cat >> test-app/config/bundles.php << 'EOF'

          // Added by CI build-validation
          EricGansa\FilterManagerBundle\FilterManagerBundle::class => ['all' => true],
          EOF

      - name: Validate bundle loads without error
        working-directory: test-app
        run: |
          php bin/console debug:container --no-interaction 2>&1 | grep -i "FilterManager" \
            && echo "✅ FilterManager service registered in container" \
            || echo "ℹ️  FilterManager not listed — checking for errors"
          php bin/console cache:clear --no-interaction
          echo "✅ Bundle installed and cache cleared successfully"

      - name: Verify default configuration loads
        working-directory: test-app
        run: |
          php bin/console debug:config filter_manager --no-interaction 2>&1 \
            && echo "✅ Bundle configuration loaded correctly" \
            || echo "⚠️  Config debug not available — checking container"
